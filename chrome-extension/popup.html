<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #1e293b;
      background: #fff;
    }
    .header {
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: #fff;
      padding: 16px;
      text-align: center;
    }
    .header h1 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .header p { font-size: 12px; opacity: 0.8; }
    .body { padding: 16px; }
    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #64748b;
      margin-bottom: 5px;
    }
    .field input, .field select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-size: 13px;
      background: #f8fafc;
      outline: none;
    }
    .field input:focus, .field select:focus {
      border-color: #7c3aed;
      background: #fff;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
      transition: all 0.15s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: #fff;
    }
    .btn-primary:hover { background: linear-gradient(135deg, #6d28d9, #5b21b6); }
    .btn-secondary {
      background: #f1f5f9;
      color: #475569;
    }
    .btn-secondary:hover { background: #e2e8f0; }
    .status {
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 12px;
      display: none;
    }
    .status.success { display: block; background: #dcfce7; color: #166534; }
    .status.error { display: block; background: #fee2e2; color: #991b1b; }
    .status.info { display: block; background: #ede9fe; color: #5b21b6; }
    .divider {
      height: 1px;
      background: #e2e8f0;
      margin: 14px 0;
    }
    .actions { display: flex; flex-direction: column; gap: 8px; }
    .stats {
      text-align: center;
      font-size: 12px;
      color: #94a3b8;
      margin-top: 12px;
    }
    .shortcut {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      font-size: 12px;
      color: #64748b;
    }
    .shortcut kbd {
      padding: 2px 6px;
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-radius: 4px;
      font-size: 11px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>💎 SEO Nugget Grabber</h1>
    <p>Extraire des pépites depuis n'importe quelle page</p>
  </div>
  <div class="body">
    <div id="status" class="status"></div>

    <div class="field">
      <label>URL de l'API</label>
      <input id="api-base" placeholder="https://seo.swipego.app" />
    </div>

    <div class="divider"></div>

    <div class="actions">
      <button class="btn btn-primary" id="btn-analyze">🔍 Analyser cette page</button>
      <button class="btn btn-secondary" id="btn-save-selection">💎 Sauvegarder la sélection</button>
    </div>

    <div class="divider"></div>

    <div>
      <div class="shortcut">
        <kbd>Clic droit</kbd>
        <span>sur du texte sélectionné → "Sauvegarder comme nugget"</span>
      </div>
      <div class="shortcut">
        <kbd>Clic droit</kbd>
        <span>sur la page → "Analyser la page entière"</span>
      </div>
    </div>

    <div class="divider"></div>

    <button class="btn btn-secondary" id="btn-test">🔗 Tester la connexion</button>
    <div id="stats" class="stats"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
